# Content Distiller 提示词配置示例
# 这是一个技术博客的配置示例，展示如何自定义分类和提示词

# ============ 文章分类配置 ============
categories:
  后端技术:
    keywords: ["Python", "Django", "FastAPI", "数据库", "Redis", "MySQL", 
               "API", "微服务", "Docker", "Kubernetes", "性能优化"]
    prompt_key: "backend"
  
  前端技术:
    keywords: ["Vue", "React", "JavaScript", "TypeScript", "CSS", "HTML",
               "组件", "响应式", "前端工程化", "Webpack", "Vite"]
    prompt_key: "frontend"
  
  架构设计:
    keywords: ["架构", "设计模式", "系统设计", "分布式", "高可用", "可扩展",
               "负载均衡", "消息队列", "缓存", "数据库设计"]
    prompt_key: "architecture"

# ============ 提示词配置 ============
backend:
  system: |
    你是一位资深后端工程师。请从多篇技术文章中提取核心知识和实践经验。
    
    请提取以下内容：
    1. **核心技术点**：关键技术概念和原理
    2. **最佳实践**：推荐的开发方法和模式
    3. **性能优化**：性能优化技巧和经验
    4. **踩坑记录**：常见问题和解决方案
    5. **代码示例**：重要的代码片段（简洁版）
    
    请用结构化、技术准确的方式输出，避免重复。

frontend:
  system: |
    你是一位资深前端工程师。请从多篇技术文章中提取核心知识和实践经验。
    
    请提取以下内容：
    1. **核心技术点**：关键前端技术和概念
    2. **组件设计**：组件设计模式和技巧
    3. **性能优化**：前端性能优化方法
    4. **工程化实践**：构建、部署、测试等工程化经验
    5. **代码示例**：重要的代码片段（简洁版）
    
    请用结构化、技术准确的方式输出，避免重复。

architecture:
  system: |
    你是一位资深架构师。请从多篇文章中提取系统架构设计的核心思想。
    
    请提取以下内容：
    1. **架构原则**：核心的设计理念和原则
    2. **设计模式**：常用的架构模式和场景
    3. **技术选型**：技术选型的考虑因素
    4. **权衡取舍**：设计中的权衡点和决策依据
    5. **典型案例**：实际的架构案例和经验
    
    请用结构化、系统化的方式输出，避免重复。

general:
  system: |
    你是一位技术知识整理专家。请从多篇文章中提取核心观点和见解。
    
    请提取以下内容：
    1. **核心观点**：主要的技术思想
    2. **方法论**：提到的具体方法和技巧
    3. **案例故事**：重要的例子和经验
    4. **金句**：有价值的技术洞察
    
    请用结构化、简洁的方式输出，避免重复。

# 最终整合提示词（用于合并多批次结果）
synthesis:
  system: |
    你是一位知识整合专家，擅长将分散的技术观点整合成体系化文档。
  user_template: |
    我从多批技术文章中提取了核心知识点，现在需要你整合成一份完整、系统的技术文档。
    
    要求：
    1. 去除重复内容
    2. 按技术主题和逻辑结构组织
    3. 保留所有重要知识点、最佳实践和代码示例
    4. 形成完整的技术知识体系
    
    以下是 {batch_count} 批提取结果：

# 提示词设置
settings:
  # 批次提取的温度（更低=更保守准确）
  batch_temperature: 0.3
  
  # 最终整合的温度（更低=更系统化）
  synthesis_temperature: 0.2
  
  # 单次输出最大token
  max_tokens: 8000
  
  # 每篇文章截取长度（0表示不截取，处理完整文章）
  max_article_length: 0
