# Content Distiller 提示词配置
# 可以根据不同的内容类型自定义提示词

# ============ 文章分类配置 ============
# 根据您的内容源自定义分类规则
categories:
  投资:
    keywords: ["投资", "股票", "美股", "市场", "估值", "仓位", "收益", "持仓", "买入", "卖出", 
               "ETF", "指数", "基金", "资产", "配置", "英伟达", "微软", "特斯拉", "苹果", 
               "谷歌", "亚马逊", "比特币", "加密货币", "财报", "分红", "复利"]
    prompt_key: "investment"  # 对应下方的提示词
  
  育儿:
    keywords: ["孩子", "育儿", "教育", "老大", "老二", "老三", "儿子", "女儿", "宝宝", 
               "小朋友", "幼儿园", "学校", "作业", "成长", "陪伴", "亲子"]
    prompt_key: "parenting"
  
  个人成长:
    keywords: ["成长", "思考", "认知", "人生", "选择", "经历", "感悟", "学习", 
               "改变", "自我", "目标", "规划", "价值观", "心态"]
    prompt_key: "personal_growth"

# ============ 提示词配置 ============
# 投资类内容提示词
investment:
  system: |
    你是一位资深投资分析师。请从多篇文章中提取核心投资理念和方法论。
    
    请提取以下内容：
    1. **核心投资理念**：作者的投资哲学和价值观
    2. **选股方法**：如何选择投资标的
    3. **仓位管理**：如何控制仓位和风险
    4. **估值方法**：如何判断估值高低
    5. **典型案例**：提到的重要投资案例
    6. **金句**：有价值的投资洞察
    
    请用结构化、简洁的方式输出，避免重复。

# 育儿类内容提示词
parenting:
  system: |
    你是一位教育专家。请从多篇文章中提取育儿理念和方法。
    
    请提取以下内容：
    1. **核心理念**：作者的育儿价值观
    2. **教育方法**：具体的教育实践
    3. **亲子关系**：如何与孩子相处
    4. **成长观察**：孩子成长的关键洞察
    5. **金句**：有启发性的育儿观点
    
    请用结构化、简洁的方式输出，避免重复。

# 个人成长类内容提示词
personal_growth:
  system: |
    你是一位人生导师。请从多篇文章中提取个人成长智慧。
    
    请提取以下内容：
    1. **核心理念**：作者的人生观和价值观
    2. **思维方式**：如何思考和决策
    3. **成长经验**：重要的人生经历和感悟
    4. **行动方法**：具体的实践建议
    5. **金句**：有价值的人生洞察
    
    请用结构化、简洁的方式输出，避免重复。

# 其他类内容提示词（通用）
general:
  system: |
    你是一位知识整理专家。请从多篇文章中提取核心观点和见解。
    
    请提取以下内容：
    1. **核心观点**：作者的主要思想
    2. **方法论**：提到的具体方法和技巧
    3. **案例故事**：重要的例子和故事
    4. **金句**：有价值的洞察
    
    请用结构化、简洁的方式输出，避免重复。

# 最终整合提示词（用于合并多批次结果）
synthesis:
  system: |
    你是一位知识整合专家，擅长将分散的观点整合成体系化文档。
  user_template: |
    我从多批文章中提取了核心观点，现在需要你整合成一份完整、系统的文档。
    
    要求：
    1. 去除重复内容
    2. 按逻辑结构组织
    3. 保留所有重要观点和案例
    4. 形成完整的知识体系
    
    以下是 {batch_count} 批提取结果：

# 提示词设置
settings:
  # 批次提取的温度（更低=更保守准确）
  batch_temperature: 0.3
  
  # 最终整合的温度（更低=更系统化）
  synthesis_temperature: 0.2
  
  # 单次输出最大token
  max_tokens: 8000
  
  # 每篇文章截取长度（0表示不截取，处理完整文章）
  max_article_length: 0
